# Project-local Codex configuration.
#
# Keep MCP server definitions here so this repository carries the integrations it
# expects. Do not commit personal tokens or machine-specific Codex desktop paths.

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp/authv2"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.sonarqube]
command = "podman"
args = [
  "run",
  "--rm",
  "-i",
  "-e", "SONARQUBE_TOKEN",
  "-e", "SONARQUBE_ORG",
  "mcp/sonarqube"
]
env = { "SONARQUBE_ORG" = "ai-config-template-project" }

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
